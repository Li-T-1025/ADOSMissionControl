version: 2
updates:
  # Weekly npm dependency updates so security and version drift surface as
  # reviewable pull requests instead of accumulating silently.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk dev tooling into one PR to cut review noise.
      dev-dependencies:
        dependency-type: "development"

  # Keep the GitHub Actions used by CI current too.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
