name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit & Store Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm run test
      - name: Run node:test runner
        run: npm run test:node
      - name: Run coverage
        run: npm run test:coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  e2e-demo:
    name: E2E Demo Mode
    runs-on: ubuntu-latest
    # Hard cap so the job can never run for hours. The webServer readiness
    # probe and per-test timeouts should fail fast well within this; this is
    # the backstop against any future hang.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      # The browser install can stall on a CDN download or the apt dependency
      # step with no built-in timeout. Cap each attempt, retry, and keep apt
      # non-interactive so a stall fails fast instead of consuming the job.
      - name: Install Playwright browsers
        timeout-minutes: 9
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
        run: |
          for attempt in 1 2 3; do
            timeout 180 npx playwright install --with-deps chromium && exit 0
            echo "playwright install attempt $attempt stalled or failed; retrying"
            sleep 5
          done
          echo "playwright install failed after 3 attempts"
          exit 1
      - name: Build demo bundle
        run: npm run e2e:build
      - name: Run E2E tests
        run: npm run test:e2e
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Run benchmarks
        run: npm run test:bench
