name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit & Store Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      # Lint and type-check run first so a style or type regression fails
      # fast, before the slower test and coverage steps.
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Run tests
        run: npm run test
      - name: Run node:test runner
        run: npm run test:node
      - name: Run coverage
        run: npm run test:coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      # Surface high/critical advisories on every push and PR. Kept
      # non-blocking while the advisory baseline is cleared; flip
      # continue-on-error off once the tree is clean to make it a gate.
      - name: Audit dependencies
        run: npm run audit:security
        continue-on-error: true

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run benchmarks
        run: npm run test:bench
